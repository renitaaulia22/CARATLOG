<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Gallery - Renita Auliyaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Plus_Jakarta_Sans']">

    <div class="sticky top-0 z-50 p-6 pointer-events-none text-left">
        <a href="index.html" class="pointer-events-auto inline-flex items-center gap-2 bg-white/80 backdrop-blur-md px-6 py-3 rounded-full shadow-md border border-white hover:bg-rose-50 hover:border-rose-200 transition-all group">
            <i data-lucide="home" class="w-4 h-4 text-slate-400 group-hover:text-rose-400"></i>
            <span class="text-xs font-bold uppercase tracking-widest text-slate-600 group-hover:text-rose-400">Beranda</span>
        </a>
    </div> 

    <main class="max-w-5xl mx-auto px-6 md:px-10 py-12">
        
        <header class="text-center mb-16">
            <div class="inline-block p-4 bg-white rounded-full shadow-sm mb-6 border border-rose-100">
                <i data-lucide="camera" class="w-8 h-8 text-rose-400"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-2 tracking-tighter uppercase">My Gallery</h1>
            <p class="text-slate-500 font-medium italic">Kumpulan momen dan favorit Renita Auliyaa</p>
        </header>

        <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
            
            <div class="break-inside-avoid bg-white p-3 rounded-[2.5rem] shadow-lg border border-white hover:scale-[1.02] transition-transform duration-500">
                <img src="WhatsApp Image 2026-03-31 at 18.11.26 (2).jpeg" class="w-full rounded-[2rem]" alt="Photo 1">
            </div>

            <div class="break-inside-avoid bg-white p-3 rounded-[2.5rem] shadow-lg border border-white hover:scale-[1.02] transition-transform duration-500">
                <img src="WhatsApp Image 2026-03-31 at 18.11.27.jpeg" class="w-full rounded-[2rem]" alt="Photo 2">
            </div>

            <div class="break-inside-avoid bg-white p-3 rounded-[2.5rem] shadow-lg border border-white hover:scale-[1.02] transition-transform duration-500">
                <img src="WhatsApp Image 2026-03-31 at 18.11.28 (1).jpeg" class="w-full rounded-[2rem]" alt="Photo 3">
            </div>

            <div class="break-inside-avoid bg-white p-3 rounded-[2.5rem] shadow-lg border border-white hover:scale-[1.02] transition-transform duration-500">
                <img src="WhatsApp Image 2026-03-31 at 18.11.29 (1).jpeg" class="w-full rounded-[2rem]" alt="Photo 4">
            </div>

            <div class="break-inside-avoid bg-white p-3 rounded-[2.5rem] shadow-lg border border-white hover:scale-[1.02] transition-transform duration-500">
                <img src="WhatsApp Image 2026-03-31 at 18.11.29.jpeg" class="w-full rounded-[2rem]" alt="Photo 5">
            </div>

            <div class="break-inside-avoid bg-white p-3 rounded-[2.5rem] shadow-lg border border-white hover:scale-[1.02] transition-transform duration-500">
                <img src="WhatsApp Image 2026-03-31 at 18.11.29 (2).jpeg" class="w-full rounded-[2rem]" alt="Photo 6">
            </div>

        </div>

        <footer class="text-center mt-20 pt-10 border-t border-slate-200">
            <p class="text-rose-400 font-bold italic">"Capturing moments, creating memories."</p>
            <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-4">&copy; 2026 Renita Auliyaa - Project Pemrograman Web</p>
        </footer>
    </main>

    <script>
      lucide.createIcons();
    </script>
</body>
</html>

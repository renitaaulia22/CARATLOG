<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to CARATLOG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Plus_Jakarta_Sans'] min-h-screen flex flex-col items-center justify-center py-10">

    <div class="text-center mb-8 px-6">
        <div class="inline-block p-4 bg-white rounded-full shadow-lg mb-6 border border-rose-100 animate-bounce-slow relative z-10">
            <span class="text-2xl font-black tracking-tighter text-slate-800 uppercase">CARAT<span class="text-rose-400">LOG</span></span>
        </div>
    </div>

    <div class="w-full max-w-4xl px-10 mb-10"> 
        <div class="bg-white p-4 rounded-[2.5rem] shadow-2xl border border-white transform rotate-1 hover:rotate-0 transition-all duration-500 ease-in-out">
            <img src="https://images.alphacoders.com/115/1156170.jpg" 
                 class="w-full h-auto rounded-[1.8rem] object-contain shadow-inner" 
                 alt="Seventeen Full Member">
            <div class="text-center mt-4">
                <p class="text-slate-500 font-bold italic tracking-widest text-sm opacity-80">"Say the name, SEVENTEEN! 💎"</p>
            </div>
        </div>
    </div>

    <div class="text-center mb-8 px-6 max-w-xl">
        <h1 class="text-3xl md:text-4xl font-black text-slate-800 mb-2 tracking-tighter uppercase leading-none">Selamat Datang</h1>
        <p class="text-slate-500 font-bold text-base tracking-wide uppercase opacity-60">Pilih menu untuk mulai eksplorasi</p>
    </div>

    <div class="w-full max-w-md px-6 space-y-4 relative z-10">
        
        <a href="blog.html" class="group block bg-white p-5 rounded-[2rem] shadow-xl border border-white hover:border-rose-300 hover:shadow-rose-100 transition-all duration-500 transform hover:-translate-y-1">
            <div class="flex items-center gap-5">
                <div class="bg-rose-50 p-4 rounded-[1.2rem] text-rose-400 group-hover:scale-110 transition-transform">
                    <i data-lucide="layout" class="w-7 h-7"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-lg font-black text-slate-800 uppercase tracking-tight">Blog SEVENTEEN</h3>
                    <p class="text-[10px] text-slate-400 font-black tracking-widest mt-1">Eksplorasi Konten</p>
                </div>
                <div class="ml-auto text-slate-300 group-hover:text-rose-400 group-hover:translate-x-1 transition-all">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </div>
            </div>
        </a> 

        <a href="contactme.html" class="group block bg-white p-5 rounded-[2rem] shadow-xl border border-white hover:border-purple-300 hover:shadow-purple-100 transition-all duration-500 transform hover:-translate-y-1">
            <div class="flex items-center gap-5">
                <div class="bg-purple-50 p-4 rounded-[1.2rem] text-purple-400 group-hover:scale-110 transition-transform">
                    <i data-lucide="user-plus" class="w-7 h-7"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-lg font-black text-slate-800 uppercase tracking-tight">Contact Me</h3>
                    <p class="text-[10px] text-slate-400 font-black tracking-widest mt-1">Mari Mutualan</p>
                </div>
                <div class="ml-auto text-slate-300 group-hover:text-purple-400 group-hover:translate-x-1 transition-all">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </div>
            </div>
        </a>

        <a href="cv.html" class="group block bg-white p-5 rounded-[2rem] shadow-xl border border-white hover:border-blue-300 hover:shadow-blue-100 transition-all duration-500 transform hover:-translate-y-1">
            <div class="flex items-center gap-5">
                <div class="bg-blue-50 p-4 rounded-[1.2rem] text-blue-400 group-hover:scale-110 transition-transform">
                    <i data-lucide="file-text" class="w-7 h-7"></i>
                </div>
                <div class="text-left">
                    <h3 class="text-lg font-black text-slate-800 uppercase tracking-tight">My Profile (CV)</h3>
                    <p class="text-[10px] text-slate-400 font-black tracking-widest mt-1">Tentang Saya</p>
                </div>
                <div class="ml-auto text-slate-300 group-hover:text-blue-400 group-hover:translate-x-1 transition-all">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </div>
            </div>
        </a>

    </div>

    <footer class="text-center py-12 text-slate-400 text-[9px] font-bold tracking-[0.3em] uppercase">
        &copy; 2026 Renita Auliyaa - Project Pemrograman Web
    </footer>

    <script>
      lucide.createIcons();
    </script>
    
    <style>
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 3s infinite ease-in-out;
        }
    </style>
</body>
</html>
